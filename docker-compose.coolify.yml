# ============================================================
# docker-compose para deploy no Coolify
# Usa build: ao invés de image: para que o Coolify construa
# a imagem a partir do Dockerfile.full neste repositório.
# ============================================================

services:
  rails:
    build:
      context: .
      dockerfile: Dockerfile.full
    container_name: chatwoot-rails
    ports:
      - "3000:3000"
    volumes:
      - storage:/app/storage
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - DEFAULT_LOCALE=pt_BR
      - FRONTEND_URL=${FRONTEND_URL}
      - INTERNAL_HOST_URL=http://rails:3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - MAILER_SENDER_EMAIL=${MAILER_SENDER_EMAIL:-noreply@chatwoot.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME=${BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME:-Chatwoot}
      - BAILEYS_PROVIDER_DEFAULT_URL=http://baileys-api:3025
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY}
      - BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL=true
    entrypoint: docker/entrypoints/rails.sh
    command:
      - bundle
      - exec
      - rails
      - s
      - '-p'
      - '3000'
      - '-b'
      - 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Accept: text/html' http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 20s
      retries: 10

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.full
    container_name: chatwoot-sidekiq
    volumes:
      - storage:/app/storage
    depends_on:
      - postgres
      - redis
      - rails
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - DEFAULT_LOCALE=pt_BR
      - FRONTEND_URL=${FRONTEND_URL}
      - INTERNAL_HOST_URL=http://rails:3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - MAILER_SENDER_EMAIL=${MAILER_SENDER_EMAIL:-noreply@chatwoot.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME=${BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME:-Chatwoot}
      - BAILEYS_PROVIDER_DEFAULT_URL=http://baileys-api:3025
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY}
      - BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL=true
    command:
      - bundle
      - exec
      - sidekiq
      - '-C'
      - config/sidekiq.yml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep [s]idekiq"]
      interval: 20s
      timeout: 20s
      retries: 10

  postgres:
    image: ghcr.io/fazer-ai/postgres-16-pgvector:latest
    container_name: chatwoot-postgres
    restart: unless-stopped
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 20s
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: chatwoot-redis
    restart: unless-stopped
    command:
      - sh
      - '-c'
      - 'redis-server --requirepass "${REDIS_PASSWORD:-}" --appendonly yes'
    volumes:
      - redis:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 20s
      timeout: 20s
      retries: 10

  baileys-api:
    image: ghcr.io/fazer-ai/baileys-api:latest
    container_name: chatwoot-baileys
    restart: unless-stopped
    volumes:
      - storage:/app/storage
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - BAILEYS_LOG_LEVEL=${BAILEYS_LOG_LEVEL:-error}
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY}
    command:
      - sh
      - '-c'
      - 'bun manage-api-keys create user ${BAILEYS_API_KEY} && bun start'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3025/status"]
      interval: 20s
      timeout: 20s
      retries: 10

volumes:
  storage:
  postgres:
  redis:
